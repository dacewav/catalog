<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DACEWAV — Beats exclusivos. Trap, R&B, Drill, Reggaeton.">
  <meta name="theme-color" content="#080808">
  <meta property="og:title" content="DACE Beats — dacewav.store">
  <meta property="og:description" content="Beats exclusivos por DACEWAV. Trap, R&B, Drill, Reggaeton.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://cdn.dacewav.store/og-cover.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="DACE Beats — dacewav.store">
  <meta name="twitter:description" content="Beats exclusivos por DACEWAV.">
  <meta name="twitter:image" content="https://cdn.dacewav.store/og-cover.jpg">
  <title>DACE Beats — dacewav.store</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/store.css">
</head>
<body>

  <!-- Banner -->
  <div class="banner" id="banner" style="display:none">
    <p class="banner__text" id="banner-text"></p>
    <button class="banner__close" id="banner-close" aria-label="Cerrar">✕</button>
  </div>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <a href="/" class="nav__logo">DACEWAV</a>
    <ul class="nav__links">
      <li><a href="#catalog">Beats</a></li>
      <li><a href="#" id="nav-instagram">Instagram</a></li>
      <li><a href="#" id="nav-beatstars">BeatStars</a></li>
      <li>
        <button class="nav__wish-btn" id="wish-toggle" aria-label="Favoritos">
          ♥
          <span class="wish-badge" id="wish-badge">0</span>
        </button>
      </li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero__content">
      <h1 class="hero__title" id="hero-title">DACE BEATS</h1>
      <p class="hero__subtitle" id="hero-subtitle">Beats exclusivos para tu próximo hit</p>
    </div>
  </section>

  <!-- Featured Section -->
  <section class="featured container" id="featured" style="display:none">
    <h2 class="featured__title">⭐ Destacados</h2>
    <div class="featured__grid" id="featured-grid"></div>
  </section>

  <!-- Catalog Section -->
  <section class="catalog container" id="catalog">
    <div class="catalog__header">
      <h2 class="catalog__title">Catálogo</h2>
    </div>
    <div class="beats-grid" id="beats-grid">
      <!-- Beats se renderizan desde JS -->
    </div>
  </section>

  <!-- Player Bar -->
  <div class="player-bar" id="player-bar">
    <div class="player-bar__cover" id="player-cover">
      <img src="" alt="" id="player-cover-img">
    </div>
    <div class="player-bar__info">
      <div class="player-bar__title" id="player-title">—</div>
      <div class="player-bar__meta" id="player-meta">—</div>
    </div>
    <div class="player-bar__controls">
      <button class="player-bar__btn" id="player-prev" aria-label="Anterior">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="player-bar__btn player-bar__btn--play" id="player-play" aria-label="Play">
        <svg viewBox="0 0 24 24" id="player-play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="player-bar__btn" id="player-next" aria-label="Siguiente">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="player-bar__progress">
      <span class="player-bar__time" id="player-current">0:00</span>
      <div class="player-bar__seek" id="player-seek">
        <div class="player-bar__seek-fill" id="player-seek-fill"></div>
      </div>
      <span class="player-bar__time" id="player-duration">0:00</span>
    </div>
    <div class="player-bar__volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input type="range" class="player-bar__volume-slider" id="player-volume" min="0" max="1" step="0.05" value="1">
    </div>
  </div>

  <!-- License Modal -->
  <div class="license-overlay" id="license-overlay">
    <div class="license-modal">
      <div class="license-modal__header">
        <h3 class="license-modal__title" id="license-beat-title">Licencias</h3>
        <button class="license-modal__close" id="license-close" aria-label="Cerrar">✕</button>
      </div>
      <div class="license-meta">
        <p class="license-desc" id="license-desc" style="display:none"></p>
        <div class="license-tags" id="license-tags" style="display:none"></div>
        <div class="license-platforms" id="license-platforms" style="display:none"></div>
      </div>
      <div class="license-tabs" id="license-tabs"></div>
      <div class="license-content" id="license-content"></div>
      <div class="license-actions" id="license-actions"></div>
    </div>
  </div>

  <!-- Wishlist Panel -->
  <div class="wish-overlay" id="wish-overlay"></div>
  <aside class="wish-panel" id="wish-panel">
    <div class="wish-panel__header">
      <h3 class="wish-panel__title">Favoritos <span id="wish-count">0</span></h3>
      <button class="wish-panel__close" id="wish-close" aria-label="Cerrar">✕</button>
    </div>
    <div class="wish-panel__list" id="wish-list">
      <!-- Rendered from JS -->
    </div>
    <div class="wish-panel__footer">
      <button class="btn-primary wish-panel__wa-btn" id="wish-whatsapp">📱 Enviar por WhatsApp</button>
    </div>
  </aside>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer__text">© 2024 DACEWAV — Todos los derechos reservados</p>
  </footer>

  <script type="module" src="js/store/main.js"></script>
</body>
</html>

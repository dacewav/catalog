<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>DACE Admin — dacewav.store</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Login Screen -->
  <div class="login-screen" id="login-screen">
    <form class="login-form" id="login-form">
      <h1 class="login-form__title">DACEWAV</h1>
      <div class="login-form__field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="email">
      </div>
      <div class="login-form__field">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" required autocomplete="current-password">
      </div>
      <div class="login-form__error" id="login-error"></div>
      <button type="submit" class="btn-primary login-form__submit">Entrar</button>
    </form>
  </div>

  <!-- Admin Screen (hidden until auth) -->
  <div class="admin-screen" id="admin-screen">

    <!-- Mobile Header -->
    <header class="admin-header" id="admin-header">
      <button class="admin-header__hamburger" id="sidebar-toggle" aria-label="Menú">☰</button>
      <span class="admin-header__title">DACEWAV</span>
      <div></div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">DACEWAV</div>
      <nav class="sidebar__nav">
        <button class="sidebar__item active" data-section="beats">Beats</button>
        <button class="sidebar__item" data-section="theme">Tema</button>
        <button class="sidebar__item" data-section="config">Config</button>
        <button class="sidebar__item" data-section="orders">Órdenes</button>
        <button class="sidebar__item" data-section="stats">Stats</button>
      </nav>
      <div class="sidebar__footer">
        <button class="sidebar__logout" id="logout-btn">Cerrar sesión</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main" id="admin-main">

      <!-- Section: Beats -->
      <section class="admin-section visible" id="section-beats">
        <h2 class="admin-section__title">Beats</h2>
        <div id="beats-container"></div>
      </section>

      <!-- Section: Theme -->
      <section class="admin-section" id="section-theme">
        <h2 class="admin-section__title">Tema</h2>
        <div id="theme-container"></div>
      </section>

      <!-- Section: Config -->
      <section class="admin-section" id="section-config">
        <h2 class="admin-section__title">Configuración</h2>
        <div id="config-container"></div>
      </section>

      <!-- Section: Orders -->
      <section class="admin-section" id="section-orders">
        <h2 class="admin-section__title">Órdenes</h2>
        <div id="orders-container"></div>
      </section>

      <!-- Section: Stats -->
      <section class="admin-section" id="section-stats">
        <h2 class="admin-section__title">Estadísticas</h2>
        <div id="stats-container"></div>
      </section>

    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="js/admin/main.js"></script>
</body>
</html>
